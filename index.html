<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌜SURAKA🌛 團務查詢</title>
    <style>
        :root {
            --brand-yellow: #FFD500;
            --brand-black: #000000;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sub: #4b5563;
            --border-color: #eeeeee;
            --status-blue: #0055ff;
            --status-gray: #a8a8a8;
            --status-dark: #374151;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { 
            font-weight: 900; font-size: 28px; position: relative; z-index: 1; 
            display: inline-block; padding: 0 10px;
        }
        .header h2::after {
            content: ""; position: absolute; bottom: 5px; left: 0;
            width: 100%; height: 12px; background: var(--brand-yellow); z-index: -1;
        }

        .search-panel {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); margin-bottom: 30px;
        }

        .form-control {
            width: 100%; padding: 14px 18px; border: 2px solid var(--border-color);
            border-radius: 15px; font-size: 16px; margin-bottom: 15px; outline: none;
        }

        .form-control:focus { border-color: var(--brand-yellow); }

        .btn-search {
            width: 100%; padding: 16px; background: var(--brand-yellow);
            border: none; border-radius: 15px; font-size: 17px; font-weight: 800;
            cursor: pointer; box-shadow: 0 6px 0 #D4B100;
        }

        .btn-search:active { transform: translateY(3px); box-shadow: 0 3px 0 #D4B100; }

        .order-card {
            background: var(--card-bg); border-radius: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); overflow: hidden; border: 1px solid var(--border-color);
        }

        .card-body { padding: 20px; display: flex; gap: 15px; }
        .product-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; background: #eee; }
        .product-name { font-size: 17px; font-weight: 800; margin-bottom: 5px; }
        .group-name { font-size: 12px; background: var(--brand-yellow); padding: 2px 8px; border-radius: 5px; font-weight: 700; }

        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 14px; }
        .amount { font-weight: 900; font-size: 18px; }

        .remarks-box { background: #f9f9f9; padding: 12px; margin: 0 20px 20px; border-radius: 10px; font-size: 13px; color: #666; }

        .status-bar { display: flex; border-top: 1px solid #f0f0f0; }
        .status-item { flex: 1; text-align: center; padding: 15px 5px; font-size: 13px; font-weight: 800; color: white; }
        
        .error-msg {
            background: #fff5f5; border: 1px solid #feb2b2; color: #c53030;
            padding: 15px; border-radius: 15px; font-size: 14px; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>團務查詢系統</h2>
        <p>🌜SURAKA🌛</p>
    </div>

    <div class="search-panel">
        <select id="statusFilter" class="form-control" onchange="renderResults()">
            <option value="all">📦 全部訂單</option>
            <option value="pending">⏳ 處理中</option>
            <option value="completed">✅ 已完成</option>
        </select>
        <input id="nameInput" type="text" class="form-control" placeholder="請輸入您的社群帳號（噗浪請+@）">
        <button class="btn-search" id="searchBtn" onclick="searchOrder()">查詢訂單</button>
    </div>

    <div id="result"></div>
</div>

<script>
    let allOrders = [];
    // 請確保此網址為您的最新部署網址 (以 /exec 結尾)
    const API_URL = "https://script.google.com/macros/s/AKfycbyadp1Xe1210jtZzOz4Gx-sEMCzTx6fM46gz2UIFTSNYGtxujAsirqW5VUNYlIbXIPy3Q/exec";

    async function searchOrder() {
        const nameInput = document.getElementById("nameInput");
        const name = nameInput.value.trim();
        const resDiv = document.getElementById("result");
        const searchBtn = document.getElementById("searchBtn");

        if(!name) { 
            resDiv.innerHTML = "<p style='text-align:center'>❗ 請輸入您的社群帳號</p>"; 
            return; 
        }

        resDiv.innerHTML = "<p style='text-align:center'>⏳ 正在連線雲端資料庫...</p>";
        searchBtn.disabled = true;

        try {
            // 構建帶有隨機參數的 URL 防止快取
            const fetchUrl = `${API_URL}?name=${encodeURIComponent(name)}&v=${new Date().getTime()}`;
            
            // 使用更寬鬆的連線方式處理 Google 重導向
            const response = await fetch(fetchUrl);
            
            if (!response.ok) {
                throw new Error(`連線回應不正常 (${response.status})`);
            }
            
            const data = await response.json();
            
            // 檢查 GAS 是否回傳了自定義錯誤
            if (data && data.error) {
                throw new Error(data.error);
            }

            allOrders = Array.isArray(data) ? data : [];
            
            if(allOrders.length === 0) {
                resDiv.innerHTML = `
                    <div class='order-card' style='padding:40px;text-align:center;color:var(--text-sub)'>
                        🔍 查無「${name}」的資料<br>
                        <small style='display:block;margin-top:10px'>
                            請確認名稱是否正確（噗浪請含 @）<br>
                            或是該帳號尚未登記於表單中
                        </small>
                    </div>`;
            } else {
                renderResults();
            }
        } catch(e) {
            console.error("Fetch Error:", e);
            resDiv.innerHTML = `
                <div class="error-msg">
                    <strong>❌ 連線失敗</strong><br>
                    錯誤訊息：${e.message === 'Failed to fetch' ? '網路請求遭攔截或 API 未正確部署' : e.message}<br><br>
                    <small>排除方案：<br>
                    1. 點擊 GAS 「部署」>「管理部署」，確認版本為「最新」<br>
                    2. 確認「誰可以存取」設為「任何人」<br>
                    3. 嘗試使用手機網路（排除特定 WiFi 阻擋）</small>
                </div>
            `;
        } finally {
            searchBtn.disabled = false;
        }
    }

    function renderResults() {
        const filter = document.getElementById("statusFilter").value;
        const resDiv = document.getElementById("result");
        
        let filtered = allOrders.filter(item => {
            const s = String(item["出貨狀態"] || item["狀態"] || "").trim();
            if(filter === "completed") return (s === "已完成" || s === "已出貨");
            if(filter === "pending") return (s !== "已完成" && s !== "已出貨");
            return true;
        });

        if (filtered.length === 0) {
            resDiv.innerHTML = "<p style='text-align:center;padding:20px;color:var(--text-sub)'>此分類下暫無訂單</p>";
            return;
        }

        resDiv.innerHTML = filtered.map(item => {
            const pStatus = String(item["付款狀態"] || "未付款").trim();
            const sStatus = String(item["出貨狀態"] || item["狀態"] || "處理中").trim();
            
            let pCol = "var(--status-gray)";
            if(pStatus.includes("已收") || pStatus.includes("已款")) pCol = "var(--status-blue)";
            else if(pStatus.includes("貨到付款")) pCol = "var(--status-dark)";

            let sCol = "var(--status-gray)";
            if(sStatus.includes("已出貨") || sStatus.includes("已完成")) sCol = "var(--status-blue)";
            else if(sStatus.includes("已下訂") || sStatus.includes("國際轉運中")) sCol = "var(--brand-black)";

            return `
                <div class="order-card">
                    <div class="card-body">
                        <img src="${item["圖片網址"] || 'https://placehold.co/100?text=SURAKA'}" 
                             class="product-img" 
                             onerror="this.src='https://placehold.co/100?text=NO+IMAGE'">
                        <div style="flex:1; min-width:0;">
                            <div class="product-name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                ${item["商品名稱"] || '未知商品'}
                            </div>
                            <span class="group-name">${item["團務名稱"] || '一般團務'}</span>
                            <div class="meta-row">
                                <span>數量: ${item["數量"] || 1}</span>
                                <span class="amount">NT$ ${item["金額"] || 0}</span>
                            </div>
                        </div>
                    </div>
                    ${item["備註"] ? `<div class="remarks-box">備註: ${item["備註"]}</div>` : ''}
                    <div class="status-bar">
                        <div class="status-item" style="background:${pCol}">${pStatus}</div>
                        <div class="status-item" style="background:${sCol}">${sStatus}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
