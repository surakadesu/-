<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌜SURAKA🌛</title>
  <style>
    /* --- 現代配色系統 (PANTONE Yellow 012 C & Black) --- */
    :root {
      --primary: #FFD700;       /* PANTONE Yellow 012 C */
      --primary-dark: #E6C200;
      --accent: #000000;        /* 黑色 */
      --bg-gray: #f1f5f9;       /* 淺灰背景 */
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-sub: #4b5563;
      --border-color: #e2e8f0;
      
      /* 狀態顏色 */
      --status-done: #0055ff;   /* 已完成/已收款 藍色 */
      --status-process: #000000; /* 進行中 黑色 */
      --status-wait: #94a3b8;    /* 等待中 灰色 */
      --status-cod: #475569;     /* 貨到付款 深灰 */
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
      background-color: var(--bg-gray);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* --- 標題區 --- */
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 10px;
    }

    .header h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      display: inline-block;
      border-bottom: 4px solid var(--primary);
    }

    .header p {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-top: 8px;
    }

    /* --- 搜尋面板 --- */
    .search-panel {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 16px;
      background-color: #ffffff;
      transition: all 0.2s;
      outline: none;
      color: var(--text-main);
      appearance: none;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.4);
    }

    select.form-control {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23000000' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 12px center;
      background-repeat: no-repeat;
      background-size: 1.2em;
      font-weight: 600;
    }

    .btn-search {
      width: 100%;
      padding: 14px;
      background-color: var(--primary);
      color: var(--accent);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0px 0px var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0px 0px var(--primary-dark);
    }

    .btn-search:active {
      transform: translateY(0);
      box-shadow: 0 0px 0px 0px var(--primary-dark);
    }

    /* --- 結果列表 --- */
    .result-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-sub);
      padding: 40px 20px;
      background: white;
      border-radius: 20px;
      border: 1px dashed var(--border-color);
    }

    .loading {
      text-align: center;
      color: var(--accent);
      font-weight: 700;
      padding: 20px;
    }

    /* --- 訂單卡片 --- */
    .order-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border: 1px solid var(--border-color);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-body {
      padding: 18px;
      display: flex;
      gap: 16px;
    }

    .product-img {
      width: 85px;
      height: 85px;
      border-radius: 12px;
      object-fit: cover;
      background-color: #f1f5f9;
      flex-shrink: 0;
      border: 1px solid #eee;
    }

    .info-col {
      flex-grow: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .group-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      background: var(--primary);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .qty-tag {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 600;
    }

    .amount-highlight {
      color: var(--accent);
      font-weight: 900;
      font-size: 18px;
    }

    /* --- 備註區 --- */
    .remarks-box {
      background-color: #f8fafc;
      border-top: 1px solid #f1f5f9;
      color: var(--text-sub);
      padding: 12px 18px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .remarks-title {
      font-weight: 800;
      color: var(--accent);
      margin-right: 6px;
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* --- 狀態列 (嚴格等寬) --- */
    .status-bar {
      display: flex;
      border-top: 1px solid var(--border-color);
    }

    .status-item {
      flex: 1;
      width: 0;
      text-align: center;
      padding: 12px 6px;
      font-size: 13px;
      font-weight: 800;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }

    .status-item:first-child {
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    /* 手機優化 */
    @media (max-width: 400px) {
      .product-img { width: 70px; height: 70px; }
      .product-name { font-size: 15px; }
      .amount-highlight { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>團務查詢系統</h2>
    <p>＜ 團務訂單進度即時查詢 ＞</p>
  </div>

  <div class="search-panel">
    <div class="form-group">
      <select id="statusFilter" class="form-control" onchange="renderResults()">
        <option value="all">📦 所有訂單</option>
        <option value="pending">⏳ 處理中</option>
        <option value="completed">✅ 已完成</option>
      </select>
    </div>
    <div class="form-group">
      <input id="nameInput" type="text" class="form-control" 
             placeholder="請輸入您加入社群時提供的社群帳號（噗浪請+@）"
             onkeypress="if(event.key === 'Enter') searchOrder()">
    </div>
    <button class="btn-search" onclick="searchOrder()">查詢</button>
  </div>

  <div id="result" class="result-area"></div>
</div>

<script>
  let allOrders = [];
  const API_URL = "https://script.google.com/macros/s/AKfycbyadp1Xe1210jtZzOz4Gx-sEMCzTx6fM46gz2UIFTSNYGtxujAsirqW5VUNYlIbXIPy3Q/exec";

  // 格式化金額
  function formatAmount(amount) {
    const val = String(amount || '').trim();
    if (!val || isNaN(parseFloat(val))) return "N/A";
    return "$" + parseFloat(val).toLocaleString('zh-TW');
  }

  // 搜尋訂單 (強化邏輯)
  async function searchOrder() {
    const nameInput = document.getElementById("nameInput");
    const resultDiv = document.getElementById("result");
    const queryName = nameInput.value.trim().toLowerCase(); // 不分大小寫搜尋

    if (!queryName) {
      resultDiv.innerHTML = `<div class="empty-state">⚠️ 請輸入您的社群帳號</div>`;
      return;
    }

    resultDiv.innerHTML = `<div class="loading">搜尋中...</div>`;

    try {
      // 增加 Cache Buster 避免瀏覽器抓到舊資料
      const res = await fetch(`${API_URL}?name=${encodeURIComponent(queryName)}&t=${Date.now()}`);
      const text = await res.text();
      
      try {
        const rawData = JSON.parse(text);
        
        if (rawData.error) {
          resultDiv.innerHTML = `<div class="empty-state">ERR: ${rawData.error}</div>`;
          return;
        }

        // 強化篩選：確保回傳的資料名稱與輸入名稱是一致的，避免 Partial Match 誤判
        // 假設後端已處理，前端再做一次保險過濾
        allOrders = rawData.filter(item => {
          const dbName = String(item["帳號名稱"] || item["社群帳號"] || '').trim().toLowerCase();
          // 如果資料庫帳號包含輸入帳號，或是完全相等才顯示
          return dbName === queryName || dbName === queryName.replace('@', '');
        });

      } catch (e) {
        resultDiv.innerHTML = `<div class="empty-state">資料解析失敗，請稍後再試</div>`;
        return;
      }

      if (!allOrders || allOrders.length === 0) {
        resultDiv.innerHTML = `<div class="empty-state">🔍 查無資料<br><small>請確認帳號是否輸入正確！</small></div>`;
        return;
      }

      renderResults();

    } catch (err) {
      resultDiv.innerHTML = `<div class="empty-state">連線中斷，請檢查網路</div>`;
    }
  }

  // 渲染結果與顏色判斷
  function renderResults() {
    const filter = document.getElementById("statusFilter").value;
    const resultDiv = document.getElementById("result");

    if (allOrders.length === 0) return;

    let filteredOrders = allOrders.filter(item => {
      const shipStatus = String(item["出貨狀態"] || '').trim();
      const isCompleted = (shipStatus === "已完成" || shipStatus === "已出貨");
      if (filter === "completed") return isCompleted;
      if (filter === "pending") return !isCompleted;
      return true;
    });

    if (filteredOrders.length === 0) {
      resultDiv.innerHTML = `<div class="empty-state">此分類下目前沒有訂單</div>`;
      return;
    }

    let html = "";
    filteredOrders.forEach(item => {
      const product = item["商品名稱"] || "未知商品";
      const group = item["團務名稱"] || "一般團務";
      const remarks = String(item["備註"] || '').trim();
      const amount = formatAmount(item["金額"]);
      const qty = item["數量"] || 1;
      const img = item["圖片網址"] || "https://placehold.co/200x200/f1f5f9/475569?text=SURAKA";

      // --- 付款狀態顏色 ---
      // 1. [已收訂金] [已收款] -> 藍色
      // 2. [貨到付款] -> 深灰色
      // 3. [未付款] -> 灰色
      const pStatus = String(item["付款狀態"] || '').trim();
      let pColor = "#94a3b8"; // 預設灰
      if (pStatus.includes("已")) pColor = "#0055ff";
      if (pStatus.includes("貨到付款")) pColor = "#475569";

      // --- 出貨狀態顏色 ---
      // 1. [已下訂] -> 黑色
      // 2. [國際轉運中] -> 黑色 (或深藍)
      // 3. [已出貨] [已完成] -> 藍色
      const sStatus = String(item["出貨狀態"] || '').trim();
      let sColor = "#000000"; // 預設黑
      if (sStatus.includes("已完成") || sStatus.includes("已出貨")) sColor = "#0055ff";
      if (sStatus === "" || sStatus.includes("待")) sColor = "#94a3b8";

      let remarksHtml = remarks ? `<div class="remarks-box"><span class="remarks-title">NOTE:</span>${remarks}</div>` : '';

      html += `
        <div class="order-card">
          <div class="card-body">
            <img src="${img}" class="product-img" onerror="this.src='https://placehold.co/200x200/f1f5f9/475569?text=IMG+ERR'">
            <div class="info-col">
              <div class="product-name">${product}</div>
              <div class="group-name">${group}</div>
              <div class="meta-row">
                <span class="qty-tag">QTY: ${qty}</span>
                <span class="amount-highlight">${amount}</span>
              </div>
            </div>
          </div>
          
          ${remarksHtml}

          <div class="status-bar">
            <div class="status-item" style="background-color: ${pColor}">
              ${pStatus || '未付款'}
            </div>
            <div class="status-item" style="background-color: ${sColor}">
              ${sStatus || '處理中'}
            </div>
          </div>
        </div>
      `;
    });

    resultDiv.innerHTML = html;
  }
</script>

</body>
</html>
